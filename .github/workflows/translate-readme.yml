name: 自动翻译 README（终极无错版）

on:
  push:
    branches: [main]

jobs:
  translate:
    runs-on: ubuntu-22.04
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # 🔥 修复1：开启正确权限
          persist-credentials: false

      - name: 安装翻译工具
        run: |
          sudo apt update -y
          sudo apt install -y translate-shell

      - name: 翻译多语言
        run: |
          trans -b en README.md > README.en.md || true
          trans -b de README.md > README.de.md || true
          trans -b fr README.md > README.fr.md || true
          trans -b ru README.md > README.ru.md || true

      - name: 提交并推送（🔥 修复2：正确Git权限）
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add README.*.md || true
          git commit -m "Auto-translate README" || true
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}