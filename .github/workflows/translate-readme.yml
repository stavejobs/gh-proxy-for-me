name: 自动翻译 README（无错版）

on:
  push:
    branches: [main]

jobs:
  translate:
    runs-on: ubuntu-22.04
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 安装翻译工具
        run: |
          sudo apt update -y
          sudo apt install -y translate-shell

      - name: 翻译多语言
        run: |
          trans -b en README.md > README.en.md || true
          trans -b de README.md > README.de.md || true
          trans -b fr README.md > README.fr.md || true
          trans -b ru README.md > README.ru.md || true

      - name: 上传翻译文件
        uses: actions/upload-artifact@v4
        with:
          name: translated-readme
          path: |
            README.en.md
            README.de.md
            README.fr.md
            README.ru.md