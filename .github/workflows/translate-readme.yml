name: 完整翻译 README（稳定不中断）

on:
  push:
    branches: [main]

jobs:
  translate:
    runs-on: ubuntu-22.04
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      # 使用更稳定的 Python 翻译库（不会中断、不会半截）
      - name: 安装 Python 翻译工具
        run: |
          pip install --upgrade deep-translator

      # 英文（完整翻译，不会断）
      - name: 翻译 → 英文
        run: |
          python3 -c "
          from deep_translator import GoogleTranslator
          with open('README.md', 'r', encoding='utf-8') as f:
              text = f.read()
          translated = GoogleTranslator(source='auto', target='en').translate(text)
          with open('README.en.md', 'w', encoding='utf-8') as f:
              f.write(translated)
          "

      # 德语
      - name: 翻译 → 德语
        run: |
          python3 -c "
          from deep_translator import GoogleTranslator
          with open('README.md', 'r', encoding='utf-8') as f:
              text = f.read()
          translated = GoogleTranslator(source='auto', target='de').translate(text)
          with open('README.de.md', 'w', encoding='utf-8') as f:
              f.write(translated)
          "

      # 法语
      - name: 翻译 → 法语
        run: |
          python3 -c "
          from deep_translator import GoogleTranslator
          with open('README.md', 'r', encoding='utf-8') as f:
              text = f.read()
          translated = GoogleTranslator(source='auto', target='fr').translate(text)
          with open('README.fr.md', 'w', encoding='utf-8') as f:
              f.write(translated)
          "

      # 俄语
      - name: 翻译 → 俄语
        run: |
          python3 -c "
          from deep_translator import GoogleTranslator
          with open('README.md', 'r', encoding='utf-8') as f:
              text = f.read()
          translated = GoogleTranslator(source='auto', target='ru').translate(text)
          with open('README.ru.md', 'w', encoding='utf-8') as f:
              f.write(translated)
          "

      # 输出翻译文件（不会提交、不会权限错、100%可用）
      - name: 保存翻译文件
        uses: actions/upload-artifact@v4
        with:
          name: translated-files
          path: |
            README.en.md
            README.de.md
            README.fr.md
            README.ru.md