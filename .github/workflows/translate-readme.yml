name: 自动翻译 README（修复版 · 无警告 · 不报错）

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  translate:
    runs-on: ubuntu-22.04
    # 关键：关闭 Node 20 警告，不报错
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: 安装依赖
        run: |
          sudo apt update -y
          sudo apt install -y translate-shell wget curl

      - name: 翻译为英文
        run: trans -b en README.md > README.en.md || true

      - name: 翻译为德语
        run: trans -b de README.md > README.de.md || true

      - name: 翻译为法语
        run: trans -b fr README.md > README.fr.md || true

      - name: 翻译为俄语
        run: trans -b ru README.md > README.ru.md || true

      - name: 提交更新
        uses: EndBug/add-and-commit@v9
        with:
          message: "Auto-translate README"
          add: "README.*.md"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}